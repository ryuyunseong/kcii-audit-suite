  - {item_id: D-13, title: "불필요한 ODBC/OLE-DB 데이터 소스와 드라이브를 제거하여 사용", category: "접근 관리", severity: medium, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires host configuration review."}
  - {item_id: D-14, title: "데이터베이스의 주요 설정파일, 비밀번호 파일 등과 같은 주요 파일들의 접근 권한이 적절하게 설정", category: "접근 관리", severity: medium, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires OS file permission context; password files must not be collected."}
  - {item_id: D-15, title: "관리자 이외의 사용자가 오라클 리스너의 접속을 통해 리스너 로그 및 trace 파일에 대한 변경 제한", category: "접근 관리", severity: low, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Oracle-specific listener item; current MVP DBMS mark manual."}
  - {item_id: D-16, title: "Windows 인증 모드 사용", category: "접근 관리", severity: low, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Mostly MSSQL/Windows authentication context; current MVP DBMS mark manual."}
  - {item_id: D-17, title: "Audit Table은 데이터베이스 관리자 계정에 접근하도록 제한", category: "옵션 관리", severity: low, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires audit table privilege review."}
  - {item_id: D-18, title: "응용프로그램 또는 DBA 계정의 Role이 Public으로 설정되지 않도록 조정", category: "옵션 관리", severity: high, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP uses a public-role risk boolean and does not store role details."}
  - {item_id: D-19, title: "OS_ROLES, REMOTE_OS_AUTHENTICATION, REMOTE_OS_ROLES를 FALSE로 설정", category: "옵션 관리", severity: high, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Oracle-specific option item; current MVP DBMS mark manual."}
  - {item_id: D-20, title: "인가되지 않은 Object owner의 제한", category: "옵션 관리", severity: low, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires approved schema/object owner review without storing owner names."}
  - {item_id: D-21, title: "인가되지 않은 GRANT OPTION 사용 제한", category: "옵션 관리", severity: medium, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP uses count-only grant option risk summary."}
  - {item_id: D-22, title: "데이터베이스의 자원 제한 기능을 TRUE로 설정", category: "옵션 관리", severity: low, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP checks resource-limit evidence when available."}
  - {item_id: D-23, title: "xp_cmdshell 사용 제한", category: "옵션 관리", severity: high, automation_level: manual, supported_dbms: *supported_dbms, source_note: "MSSQL-specific item; current PostgreSQL/MySQL/MariaDB MVP mark manual."}
  - {item_id: D-24, title: "Registry Procedure 권한 제한", category: "옵션 관리", severity: high, automation_level: manual, supported_dbms: *supported_dbms, source_note: "MSSQL-specific item; current PostgreSQL/MySQL/MariaDB MVP mark manual."}
  - {item_id: D-25, title: "주기적 보안 패치 및 벤더 권고 사항 적용", category: "패치 관리", severity: high, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP records whether version evidence exists; current-vs-advisory judgment remains manual."}
  - {item_id: D-26, title: "데이터베이스의 접근, 변경, 삭제 등의 감사 기록이 기관의 감사 기록 정책에 적합하도록 설정", category: "패치 관리", severity: high, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP checks audit logging summary where available."}
