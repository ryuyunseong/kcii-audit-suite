  - {item_id: D-06, title: "DB 사용자 계정을 개별적으로 부여하여 사용", category: "계정 관리", severity: medium, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires approved account ownership review without storing account names."}
  - {item_id: D-07, title: "root 권한으로 서비스 구동 제한", category: "계정 관리", severity: medium, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires OS service account context."}
  - {item_id: D-08, title: "안전한 암호화 알고리즘 사용", category: "계정 관리", severity: high, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP checks a sanitized secure algorithm flag and never queries password hashes."}
  - {item_id: D-09, title: "일정 횟수의 로그인 실패 시 이에 대한 잠금정책 설정", category: "계정 관리", severity: medium, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP checks lockout policy summary where DBMS exposes it safely."}
  - {item_id: D-10, title: "원격에서 DB 서버로의 접속 제한", category: "접근 관리", severity: high, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP checks whether remote access appears restricted; raw IPs and CIDRs are not stored."}
  - {item_id: D-11, title: "DBA 이외의 인가되지 않은 사용자가 시스템 테이블에 접근할 수 없도록 설정", category: "접근 관리", severity: high, automation_level: manual, supported_dbms: *supported_dbms, source_note: "Requires privilege review without storing permission details."}
