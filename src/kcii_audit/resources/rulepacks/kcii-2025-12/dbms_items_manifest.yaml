  - {item_id: D-04, title: "데이터베이스 관리자 권한을 꼭 필요한 계정 및 그룹에 대해서만 허용", category: "계정 관리", severity: high, automation_level: partial, supported_dbms: *supported_dbms, source_note: "MVP uses a boolean excessive-admin summary and does not store account lists."}
