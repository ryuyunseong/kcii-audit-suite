guide_version: kcii-2025-12
domain: windows
items:
  - category: 계정 관리
    item_id: W-01
    title: Administrator 계정 이름 변경 등 보안성 강화
    severity: high
    target_platforms: &windows_platforms
      - windows
    collector: &windows_collector scripts/targets/windows_server/collect.ps1
    evidence_fields:
      - administrator_account_renamed
    decision_rules:
      - status: GOOD
        when:
          field: administrator_account_renamed
          operator: equals
          value: true
        reason: Administrator 기본 계정 이름이 변경된 것으로 확인되었습니다.
      - status: MANUAL_REQUIRED
        when:
          field: administrator_account_renamed
          operator: equals
          value: false
        reason: Administrator 기본 계정 이름이 유지되어 비밀번호 보안성 등 추가 확인이 필요합니다.
    remediation: Administrator 기본 계정 이름을 변경하거나 강화된 비밀번호 적용 여부를 확인합니다.
    report_text: Administrator 기본 계정 이름과 보안성 강화 여부를 점검합니다.

  - category: 계정 관리
    item_id: W-02
    title: Guest 계정 비활성화
    severity: high
    target_platforms: *windows_platforms
    collector: *windows_collector
    evidence_fields:
      - guest_account_enabled
    decision_rules:
      - status: GOOD
        when:
          field: guest_account_enabled
          operator: equals
          value: false
        reason: Guest 계정이 비활성화되어 있습니다.
      - status: VULNERABLE
        when:
          field: guest_account_enabled
          operator: equals
          value: true
        reason: Guest 계정이 활성화되어 있습니다.
    remediation: Guest 계정 사용 여부를 검토하고 불필요한 경우 비활성화합니다.
    report_text: Guest 계정 활성 상태를 점검합니다.

  - category: 계정 관리
    item_id: W-03
    title: 불필요한 계정 제거
    severity: high
    target_platforms: *windows_platforms
    collector: *windows_collector
    evidence_fields: &manual_evidence_fields
      - manual_required
    decision_rules: &manual_decision_rules
      - status: MANUAL_REQUIRED
        when:
          field: manual_required
          operator: equals
          value: true
        reason: 공식 Windows Server 항목은 등록되어 있으나 Windows MVP parser에서 자동 판정하지 않습니다.
    remediation: 공식 가이드와 기관 보안 기준에 따라 추가 증적을 확인하고 수동 판정을 완료합니다.
    report_text: 불필요한 계정 존재 여부를 수동 확인합니다.

  - category: 계정 관리
    item_id: W-04
    title: 계정 잠금 임계값 설정
    severity: high
    target_platforms: *windows_platforms
    collector: *windows_collector
    evidence_fields:
      - account_lockout_threshold_ok
    decision_rules:
      - status: GOOD
        when:
          field: account_lockout_threshold_ok
          operator: equals
          value: true
        reason: 계정 잠금 임계값이 MVP 기준인 1 이상 5 이하로 확인되었습니다.
      - status: VULNERABLE
        when:
          field: account_lockout_threshold_ok
          operator: equals
          value: false
        reason: 계정 잠금 임계값이 미설정이거나 5를 초과합니다.
    remediation: 계정 잠금 임계값을 5 이하의 값으로 설정합니다.
    report_text: 계정 잠금 임계값 설정 여부를 점검합니다.

