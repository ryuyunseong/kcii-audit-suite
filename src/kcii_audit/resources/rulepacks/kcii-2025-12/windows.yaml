  - category: 계정 관리
    item_id: W-08
    title: 계정 잠금 기간 설정
    severity: medium
    target_platforms: *windows_platforms
    collector: *windows_collector
    evidence_fields:
      - account_lockout_duration_ok
    decision_rules:
      - status: GOOD
        when:
          field: account_lockout_duration_ok
          operator: equals
          value: true
        reason: 계정 잠금 기간 및 관찰 기간이 MVP 기준 60분 이상으로 확인되었습니다.
      - status: VULNERABLE
        when:
          field: account_lockout_duration_ok
          operator: equals
          value: false
        reason: 계정 잠금 기간 또는 관찰 기간이 미설정이거나 60분 미만입니다.
    remediation: 계정 잠금 기간 및 원래대로 설정 기간을 60분 이상으로 설정합니다.
    report_text: 계정 잠금 기간 설정 여부를 점검합니다.

  - category: 계정 관리
    item_id: W-09
    title: 비밀번호 관리정책 설정
    severity: high
    target_platforms: *windows_platforms
    collector: *windows_collector
    evidence_fields:
      - minimum_password_length
    decision_rules:
      - status: GOOD
        when:
          field: minimum_password_length
          operator: gte
          value: 8
        reason: 최소 암호 길이가 MVP 기준 8자 이상입니다.
      - status: VULNERABLE
        when:
          field: minimum_password_length
          operator: lt
          value: 8
        reason: 최소 암호 길이가 MVP 기준 8자 미만입니다.
    remediation: 비밀번호 복잡성, 최소 길이, 최대/최소 사용 기간, 최근 암호 기억 기준을 기관 정책에 맞게 설정합니다.
    report_text: 비밀번호 관리정책 중 최소 암호 길이를 우선 점검합니다.

