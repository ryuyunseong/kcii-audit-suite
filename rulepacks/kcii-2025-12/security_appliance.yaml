- item_id: S-01
  domain: security_appliance
  category: 계정 관리
  title: 보안 장비 Default 계정 변경
  severity: high
  target_platforms:
  - security_appliance
  supported_appliance_types:
  - firewall
  - ips
  - ids
  - waf
  - vpn
  - anti-ddos
  - fortigate
  - paloalto
  - cisco-asa
  - f5
  evidence_source:
  - questionnaire
  - interview
  - config_export_summary
  config_hints_by_vendor: &id001
    fortigate: Use sanitized FortiGate config export or GUI evidence summary; do not
      store raw policy names, serials, or object names.
    paloalto: Use sanitized PAN-OS config export or GUI evidence summary; do not store
      raw policy names, serials, or object names.
    cisco-asa: Use sanitized Cisco ASA show/config summary; do not store raw ACL,
      object, hostname, or serial values.
    f5: Use sanitized BIG-IP configuration or GUI evidence summary; do not store virtual
      server, pool, serial, or certificate body values.
    generic: Use questionnaire, interview notes, and sanitized config summary only.
  questionnaire_fields:
  - item_id
  - question
  - answer_type
  - required_evidence
  - options
  - mapping_rule
  - answer
  - evidence_status
  - default_account_changed
  automation_level: partial
  decision_mode: deterministic
  collector: questionnaires/security_appliance_schema.yaml
  evidence_fields:
  - default_account_changed
  decision_rules:
  - status: GOOD
    when:
      field: default_account_changed
      operator: equals
      value: true
    reason: 보안 장비 Default 계정 변경 ??? sanitized evidence ???? ?????.
